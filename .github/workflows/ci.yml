name: CI — SNGuard

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:

  # ─────────────────────────────────────────────
  # 1. PHP Syntax — verifica erros de sintaxe em todos os .php
  # ─────────────────────────────────────────────
  php-syntax:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint all PHP files
        run: |
          ERROR=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERROR=1
            fi
          done < <(find backend -name "*.php")
          if [ $ERROR -ne 0 ]; then
            echo "❌ PHP syntax errors found"
            exit 1
          fi
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # 2. Strict Types — todos os .php devem ter declare(strict_types=1)
  # ─────────────────────────────────────────────
  php-strict-types:
    name: PHP Strict Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check declare(strict_types=1) in all PHP files
        run: |
          MISSING=$(find backend -name "*.php" -exec grep -L "declare(strict_types=1)" {} \;)
          if [ -n "$MISSING" ]; then
            echo "❌ Missing declare(strict_types=1) in:"
            echo "$MISSING"
            exit 1
          fi
          echo "✅ All PHP files have declare(strict_types=1)"

  # ─────────────────────────────────────────────
  # 3. Security Scan — padrões perigosos no código PHP
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous PHP functions
        run: |
          ERROR=0

          # md5/sha1 para senhas
          if grep -rn "md5\s*(" backend/ --include="*.php" | grep -iE "password|hash|senha|pass"; then
            echo "❌ md5() não deve ser usado para hashing de senhas"
            ERROR=1
          fi
          if grep -rn "sha1\s*(" backend/ --include="*.php" | grep -iE "password|hash|senha|pass"; then
            echo "❌ sha1() não deve ser usado para hashing de senhas"
            ERROR=1
          fi

          # eval()
          if grep -rn "eval\s*(" backend/ --include="*.php"; then
            echo "❌ eval() encontrado — proibido por segurança"
            ERROR=1
          fi

          # mysql_* depreciado
          if grep -rn "mysql_query\|mysql_connect\|mysql_fetch" backend/ --include="*.php"; then
            echo "❌ Funções mysql_* depreciadas — usar PDO"
            ERROR=1
          fi

          # Concatenação de input direto em SQL
          if grep -rn '\$_GET\|\$_POST\|\$_REQUEST' backend/ --include="*.php" | grep -E '".*SELECT|UPDATE|DELETE|INSERT'; then
            echo "❌ Possível SQL injection — input direto em query"
            ERROR=1
          fi

          # mail() nativo (usar PHPMailer)
          if grep -rn "^\s*mail\s*(" backend/ --include="*.php"; then
            echo "❌ mail() nativo encontrado — usar PHPMailer (header injection risk)"
            ERROR=1
          fi

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ Security scan passed"

      - name: Check for committed secrets
        run: |
          # secrets.php não deve estar no repositório
          if git ls-files | grep -q "secrets\.php$"; then
            echo "❌ secrets.php está commitado — remover imediatamente"
            exit 1
          fi
          # .env não deve estar (só .env.example é permitido)
          if git ls-files | grep -E "^\.env$|^\.env\.(local|production|staging)$"; then
            echo "❌ Arquivo .env comprometido no repositório"
            exit 1
          fi
          # Chaves hardcoded suspeitas
          if grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" backend/ --include="*.php" | grep -v "//\|#\|password_hash\|password_verify\|password_needs_rehash"; then
            echo "⚠️  Possível senha hardcoded encontrada"
            exit 1
          fi
          echo "✅ No secrets detected"

  # ─────────────────────────────────────────────
  # 4. HTML Lint — validação de estrutura HTML
  # ─────────────────────────────────────────────
  html-lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML pages
        run: htmlhint "frontend/pages/*.html" --config .htmlhintrc

  # ─────────────────────────────────────────────
  # 5. Schema Integrity — schema.sql estrutura mínima
  # ─────────────────────────────────────────────
  schema-check:
    name: Schema Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate schema.sql
        run: |
          ERROR=0

          if ! grep -q "SET FOREIGN_KEY_CHECKS = 0" database/schema.sql; then
            echo "❌ schema.sql: falta SET FOREIGN_KEY_CHECKS = 0"
            ERROR=1
          fi
          if ! grep -q "SET FOREIGN_KEY_CHECKS = 1" database/schema.sql; then
            echo "❌ schema.sql: falta SET FOREIGN_KEY_CHECKS = 1"
            ERROR=1
          fi
          if ! grep -q "utf8mb4" database/schema.sql; then
            echo "❌ schema.sql: deve usar charset utf8mb4"
            ERROR=1
          fi
          if ! grep -q "ENGINE=InnoDB" database/schema.sql; then
            echo "❌ schema.sql: deve usar ENGINE=InnoDB"
            ERROR=1
          fi

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ Schema integrity check passed"

  # ─────────────────────────────────────────────
  # 6. File Structure — arquivos obrigatórios presentes
  # ─────────────────────────────────────────────
  structure-check:
    name: File Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          ERROR=0
          REQUIRED=(
            "backend/config/db.php"
            "backend/auth/login.php"
            "backend/auth/register.php"
            "backend/auth/logout.php"
            "backend/auth/confirm.php"
            "backend/auth/recover.php"
            "backend/auth/mfa.php"
            "backend/utils/hash.php"
            "backend/utils/mailer.php"
            "database/schema.sql"
            ".env.example"
            ".gitignore"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Arquivo obrigatório ausente: $f"
              ERROR=1
            fi
          done

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ All required files present"

  # ─────────────────────────────────────────────
  # 7. File Lock — bloqueia merge de arquivos com prazo encerrado
  # ─────────────────────────────────────────────
  file-lock:
    name: File Lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar arquivos bloqueados
        env:
          GH_EVENT: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$GH_EVENT" != "pull_request" ]; then
            echo "Não é um PR — verificação ignorada."
            exit 0
          fi

          TODAY=$(date -u '+%Y-%m-%d')
          git fetch origin "$GH_BASE_REF" --quiet
          CHANGED=$(git diff --name-only "origin/$GH_BASE_REF...HEAD")

          echo "Arquivos modificados neste PR:"
          echo "$CHANGED"
          echo "---"

          BLOCKED=0

          lock_check() {
            local pattern="$1"
            local lock_date="$2"
            local owner="$3"
            local task="$4"

            if echo "$CHANGED" | grep -qE "$pattern"; then
              if [[ "$TODAY" > "$lock_date" || "$TODAY" == "$lock_date" ]]; then
                echo "❌  Arquivo bloqueado: $(echo "$CHANGED" | grep -E "$pattern" | head -1)"
                echo "    Responsável : $owner"
                echo "    Tarefa      : $task"
                echo "    Prazo       : $lock_date"
                BLOCKED=1
              fi
            fi
          }

          # --- Bloqueio: 2026-03-23 ---
          lock_check "frontend/pages/mfa\.html"                   "2026-03-23" "Wellington"       "Autenticação MFA"
          lock_check "backend/auth/mfa\.php"                      "2026-03-23" "Wellington"       "Autenticação MFA"
          lock_check "frontend/pages/recuperacao-senha\.html"     "2026-03-23" "Henrique"         "Recuperação de Senha"
          lock_check "backend/auth/recover\.php"                  "2026-03-23" "Henrique"         "Recuperação de Senha"
          # Kauã desbloqueado manualmente em 2026-03-23
          # lock_check "frontend/pages/confirmacao-cadastro\.html"  "2026-03-23" "Kauã"             "Confirmação de Cadastro"
          # lock_check "backend/auth/confirm\.php"                  "2026-03-23" "Kauã"             "Confirmação de Cadastro"
          lock_check "lgpd.transparencia|transparencia.dados"     "2026-03-23" "Wellington"       "LGPD Transparência de Dados"
          lock_check "lgpd.esquecimento|direito.esquecimento"     "2026-03-23" "Henrique"         "LGPD Direito ao Esquecimento"
          lock_check "lgpd.consentimento|controle.consentimento"  "2026-03-23" "Henrique/Gustavo" "LGPD Controle de Consentimento"

          # --- Bloqueio: 2026-03-24 ---
          lock_check "frontend/pages/index\.html"                 "2026-03-24" "Wellington"       "Home e Index"
          lock_check "frontend/pages/busca\.html"                 "2026-03-24" "Gustavo"          "Consultas SN"
          lock_check "backend/produto/buscar\.php"                "2026-03-24" "Gustavo"          "Consultas SN"
          lock_check "backend/produto/status\.php"                "2026-03-24" "Gustavo"          "Consultas SN"
          lock_check "frontend/pages/redefinicao-senha\.html"     "2026-03-24" "Kauã"             "Redefinição de Senha"
          lock_check "frontend/pages/dashboard\.html"             "2026-03-24" "Henrique"         "Dashboard Padrão"

          if [ "$BLOCKED" -eq 1 ]; then
            echo ""
            echo "Este PR inclui arquivos com prazo encerrado."
            echo "Contate Gerard Gonzalez para autorização de desbloqueio."
            exit 1
          fi

          echo "✅ Nenhum arquivo bloqueado."
