name: CI — SNGuard

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:

  # ─────────────────────────────────────────────
  # 1. PHP Syntax — verifica erros de sintaxe em todos os .php
  # ─────────────────────────────────────────────
  php-syntax:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint all PHP files
        run: |
          ERROR=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERROR=1
            fi
          done < <(find backend -name "*.php")
          if [ $ERROR -ne 0 ]; then
            echo "❌ PHP syntax errors found"
            exit 1
          fi
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # 2. Strict Types — todos os .php devem ter declare(strict_types=1)
  # ─────────────────────────────────────────────
  php-strict-types:
    name: PHP Strict Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check declare(strict_types=1) in all PHP files
        run: |
          MISSING=$(find backend -name "*.php" -exec grep -L "declare(strict_types=1)" {} \;)
          if [ -n "$MISSING" ]; then
            echo "❌ Missing declare(strict_types=1) in:"
            echo "$MISSING"
            exit 1
          fi
          echo "✅ All PHP files have declare(strict_types=1)"

  # ─────────────────────────────────────────────
  # 3. Security Scan — padrões perigosos no código PHP
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dangerous PHP functions
        run: |
          ERROR=0

          # md5/sha1 para senhas
          if grep -rn "md5\s*(" backend/ --include="*.php" | grep -iE "password|hash|senha|pass"; then
            echo "❌ md5() não deve ser usado para hashing de senhas"
            ERROR=1
          fi
          if grep -rn "sha1\s*(" backend/ --include="*.php" | grep -iE "password|hash|senha|pass"; then
            echo "❌ sha1() não deve ser usado para hashing de senhas"
            ERROR=1
          fi

          # eval()
          if grep -rn "eval\s*(" backend/ --include="*.php"; then
            echo "❌ eval() encontrado — proibido por segurança"
            ERROR=1
          fi

          # mysql_* depreciado
          if grep -rn "mysql_query\|mysql_connect\|mysql_fetch" backend/ --include="*.php"; then
            echo "❌ Funções mysql_* depreciadas — usar PDO"
            ERROR=1
          fi

          # Concatenação de input direto em SQL
          if grep -rn '\$_GET\|\$_POST\|\$_REQUEST' backend/ --include="*.php" | grep -E '".*SELECT|UPDATE|DELETE|INSERT'; then
            echo "❌ Possível SQL injection — input direto em query"
            ERROR=1
          fi

          # mail() nativo (usar PHPMailer)
          if grep -rn "^\s*mail\s*(" backend/ --include="*.php"; then
            echo "❌ mail() nativo encontrado — usar PHPMailer (header injection risk)"
            ERROR=1
          fi

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ Security scan passed"

      - name: Check for committed secrets
        run: |
          # secrets.php não deve estar no repositório
          if git ls-files | grep -q "secrets\.php$"; then
            echo "❌ secrets.php está commitado — remover imediatamente"
            exit 1
          fi
          # .env não deve estar (só .env.example é permitido)
          if git ls-files | grep -E "^\.env$|^\.env\.(local|production|staging)$"; then
            echo "❌ Arquivo .env comprometido no repositório"
            exit 1
          fi
          # Chaves hardcoded suspeitas
          if grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" backend/ --include="*.php" | grep -v "//\|#\|password_hash\|password_verify\|password_needs_rehash"; then
            echo "⚠️  Possível senha hardcoded encontrada"
            exit 1
          fi
          echo "✅ No secrets detected"

  # ─────────────────────────────────────────────
  # 4. HTML Lint — validação de estrutura HTML
  # ─────────────────────────────────────────────
  html-lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HTMLHint
        run: npm install -g htmlhint

      - name: Lint HTML pages
        run: htmlhint "frontend/pages/*.html" --config .htmlhintrc

  # ─────────────────────────────────────────────
  # 5. Schema Integrity — schema.sql estrutura mínima
  # ─────────────────────────────────────────────
  schema-check:
    name: Schema Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate schema.sql
        run: |
          ERROR=0

          if ! grep -q "SET FOREIGN_KEY_CHECKS = 0" database/schema.sql; then
            echo "❌ schema.sql: falta SET FOREIGN_KEY_CHECKS = 0"
            ERROR=1
          fi
          if ! grep -q "SET FOREIGN_KEY_CHECKS = 1" database/schema.sql; then
            echo "❌ schema.sql: falta SET FOREIGN_KEY_CHECKS = 1"
            ERROR=1
          fi
          if ! grep -q "utf8mb4" database/schema.sql; then
            echo "❌ schema.sql: deve usar charset utf8mb4"
            ERROR=1
          fi
          if ! grep -q "ENGINE=InnoDB" database/schema.sql; then
            echo "❌ schema.sql: deve usar ENGINE=InnoDB"
            ERROR=1
          fi

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ Schema integrity check passed"

  # ─────────────────────────────────────────────
  # 6. File Structure — arquivos obrigatórios presentes
  # ─────────────────────────────────────────────
  structure-check:
    name: File Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          ERROR=0
          REQUIRED=(
            "backend/config/db.php"
            "backend/auth/login.php"
            "backend/auth/register.php"
            "backend/auth/logout.php"
            "backend/auth/confirm.php"
            "backend/auth/recover.php"
            "backend/auth/mfa.php"
            "backend/utils/hash.php"
            "backend/utils/mailer.php"
            "database/schema.sql"
            ".env.example"
            ".gitignore"
          )
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "❌ Arquivo obrigatório ausente: $f"
              ERROR=1
            fi
          done

          if [ $ERROR -ne 0 ]; then exit 1; fi
          echo "✅ All required files present"
