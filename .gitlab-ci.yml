stages:
  - validate
  - security

# ─────────────────────────────────────────────
# 1. PHP Syntax
# ─────────────────────────────────────────────
php-syntax:
  stage: validate
  image: php:8.1-cli
  script:
    - |
      ERROR=0
      while IFS= read -r file; do
        if ! php -l "$file" > /dev/null 2>&1; then
          php -l "$file"
          ERROR=1
        fi
      done < <(find backend -name "*.php")
      if [ $ERROR -ne 0 ]; then
        echo "PHP syntax errors found"
        exit 1
      fi
      echo "All PHP files passed syntax check"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────
# 2. Strict Types
# ─────────────────────────────────────────────
php-strict-types:
  stage: validate
  image: php:8.1-cli
  script:
    - |
      MISSING=$(find backend -name "*.php" -exec grep -L "declare(strict_types=1)" {} \;)
      if [ -n "$MISSING" ]; then
        echo "Missing declare(strict_types=1) in:"
        echo "$MISSING"
        exit 1
      fi
      echo "All PHP files have declare(strict_types=1)"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────
# 3. HTML Lint
# ─────────────────────────────────────────────
html-lint:
  stage: validate
  image: node:20-alpine
  script:
    - npm install -g htmlhint
    - htmlhint "frontend/pages/*.html" --config .htmlhintrc
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────
# 4. Schema Integrity
# ─────────────────────────────────────────────
schema-check:
  stage: validate
  image: alpine:latest
  script:
    - |
      ERROR=0
      grep -q "SET FOREIGN_KEY_CHECKS = 0" database/schema.sql || { echo "Missing FOREIGN_KEY_CHECKS = 0"; ERROR=1; }
      grep -q "SET FOREIGN_KEY_CHECKS = 1" database/schema.sql || { echo "Missing FOREIGN_KEY_CHECKS = 1"; ERROR=1; }
      grep -q "utf8mb4" database/schema.sql                    || { echo "Should use utf8mb4 charset"; ERROR=1; }
      grep -q "ENGINE=InnoDB" database/schema.sql              || { echo "Should use ENGINE=InnoDB"; ERROR=1; }
      if [ $ERROR -ne 0 ]; then exit 1; fi
      echo "Schema integrity check passed"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ─────────────────────────────────────────────
# 5. Security Scan
# ─────────────────────────────────────────────
security-scan:
  stage: security
  image: alpine:latest
  script:
    - |
      ERROR=0

      # md5/sha1 para senhas
      if grep -rn "md5\s*(" backend/ --include="*.php" 2>/dev/null | grep -iE "password|hash|senha|pass"; then
        echo "md5() nao deve ser usado para hashing de senhas"
        ERROR=1
      fi
      if grep -rn "sha1\s*(" backend/ --include="*.php" 2>/dev/null | grep -iE "password|hash|senha|pass"; then
        echo "sha1() nao deve ser usado para hashing de senhas"
        ERROR=1
      fi

      # eval()
      if grep -rn "eval\s*(" backend/ --include="*.php" 2>/dev/null; then
        echo "eval() encontrado — proibido por seguranca"
        ERROR=1
      fi

      # mysql_* depreciado
      if grep -rn "mysql_query\|mysql_connect\|mysql_fetch" backend/ --include="*.php" 2>/dev/null; then
        echo "Funcoes mysql_* depreciadas — usar PDO"
        ERROR=1
      fi

      # mail() nativo
      if grep -rn "^\s*mail\s*(" backend/ --include="*.php" 2>/dev/null; then
        echo "mail() nativo — usar PHPMailer"
        ERROR=1
      fi

      # secrets.php commitado
      if git ls-files | grep -q "secrets\.php$"; then
        echo "secrets.php esta commitado — remover imediatamente"
        ERROR=1
      fi

      # .env commitado
      if git ls-files | grep -qE "^\.env$|^\.env\.(local|production|staging)$"; then
        echo "Arquivo .env no repositorio"
        ERROR=1
      fi

      if [ $ERROR -ne 0 ]; then exit 1; fi
      echo "Security scan passed"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# ─────────────────────────────────────────────
# 6. File Structure
# ─────────────────────────────────────────────
structure-check:
  stage: validate
  image: alpine:latest
  script:
    - |
      ERROR=0
      for f in \
        "backend/config/db.php" \
        "backend/auth/login.php" \
        "backend/auth/register.php" \
        "backend/auth/logout.php" \
        "backend/auth/confirm.php" \
        "backend/auth/recover.php" \
        "backend/auth/mfa.php" \
        "backend/utils/hash.php" \
        "backend/utils/mailer.php" \
        "database/schema.sql" \
        ".env.example" \
        ".gitignore"; do
        if [ ! -f "$f" ]; then
          echo "Arquivo obrigatorio ausente: $f"
          ERROR=1
        fi
      done
      if [ $ERROR -ne 0 ]; then exit 1; fi
      echo "All required files present"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
