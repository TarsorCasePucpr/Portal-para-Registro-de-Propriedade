<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNGuard — Painel Para o Administrador</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-blue:   #1a56db;
            --brand-blue-h: #1648c0;
            --navy:         #1e2d4a;
            --navy-soft:    #374151;
            --bg:           #f4f6fb;
            --surface:      #ffffff;
            --border:       #e2e8f0;
            --muted:        #64748b;
            --danger:       #ef4444;
            --warning:      #f59e0b;
            --success:      #22c55e;
        }
 
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--navy);
            min-height: 100vh;
        }
 
        /* ── Topbar ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .85rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 6px rgba(26,86,219,.07);
        }
        .topbar-brand {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--brand-blue);
            letter-spacing: -.3px;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .topbar-admin {
            font-size: .82rem;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: .3rem .85rem;
            font-weight: 500;
        }
        .btn-logout {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            border-radius: 8px;
            padding: .38rem .9rem;
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all .18s;
        }
        .btn-logout:hover {
            background: var(--danger);
            color: #fff;
        }
 
        /* ── Wrapper ── */
        .wrapper { max-width: 1300px; margin: 0 auto; padding: 1.75rem 1.5rem; }
 
        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: .35rem;
            margin-bottom: 1.75rem;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
        }
        .tab-btn {
            padding: .55rem 1.2rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: .875rem;
            font-weight: 600;
            color: var(--muted);
            font-family: inherit;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all .15s;
            border-radius: 0;
        }
        .tab-btn:hover { color: var(--brand-blue); }
        .tab-btn.active {
            color: var(--brand-blue);
            border-bottom-color: var(--brand-blue);
        }
 
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
 
        /* ── Stat cards ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 1.2rem 1.3rem;
            border: 1px solid var(--border);
            border-top: 3px solid var(--brand-blue);
            box-shadow: 0 1px 3px rgba(26,86,219,.06);
            transition: box-shadow .18s;
        }
        .stat-card:hover { box-shadow: 0 4px 14px rgba(26,86,219,.1); }
        .stat-card.warn  { border-top-color: var(--warning); }
        .stat-card.danger{ border-top-color: var(--danger); }
        .stat-card.green { border-top-color: var(--success); }
        .stat-card .label { font-size: .72rem; color: var(--muted); margin-bottom: .35rem; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
        .stat-card .value { font-size: 1.9rem; font-weight: 800; color: var(--navy); }
 
        /* ── Table controls ── */
        .table-controls {
            display: flex;
            gap: .75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .table-controls input, .table-controls select {
            padding: .5rem .85rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: .85rem;
            font-family: inherit;
            outline: none;
            background: var(--surface);
            color: var(--navy);
            transition: border .15s, box-shadow .15s;
        }
        .table-controls input:focus, .table-controls select:focus {
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(26,86,219,.1);
        }
        .table-controls input { flex: 1; min-width: 180px; }
 
        /* ── Table ── */
        .table-wrap {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 1px 3px rgba(26,86,219,.05);
        }
        table { width: 100%; border-collapse: collapse; font-size: .84rem; }
        thead { background: var(--bg); }
        th {
            padding: .8rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--muted);
            border-bottom: 1.5px solid var(--border);
            font-size: .76rem;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        td { padding: .72rem 1rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8faff; }
 
        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: .22rem .6rem;
            border-radius: 20px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .badge-green  { background: #dcfce7; color: #15803d; }
        .badge-red    { background: #fee2e2; color: #b91c1c; }
        .badge-yellow { background: #fef9c3; color: #92400e; }
        .badge-blue   { background: #dbeafe; color: var(--brand-blue); }
        .badge-gray   { background: #f1f5f9; color: var(--muted); }
 
        /* ── Action buttons ── */
        .btn-sm {
            padding: .3rem .7rem;
            border: none;
            border-radius: 6px;
            font-size: .75rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-right: .2rem;
            transition: opacity .15s, transform .1s;
        }
        .btn-sm:hover { opacity: .85; transform: translateY(-1px); }
        .btn-primary   { background: var(--brand-blue); color: #fff; }
        .btn-success   { background: var(--success); color: #fff; }
        .btn-warning   { background: var(--warning); color: #fff; }
        .btn-danger    { background: var(--danger); color: #fff; }
        .btn-secondary { background: var(--bg); color: var(--navy-soft); border: 1px solid var(--border); }
 
        /* ── Pagination ── */
        .pagination {
            display: flex;
            gap: .35rem;
            justify-content: flex-end;
            padding: .8rem 1rem;
            background: var(--bg);
            border-top: 1px solid var(--border);
            align-items: center;
            font-size: .82rem;
            color: var(--muted);
        }
        .pagination button {
            padding: .32rem .72rem;
            border: 1.5px solid var(--border);
            background: var(--surface);
            border-radius: 7px;
            cursor: pointer;
            font-size: .78rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--navy-soft);
            transition: all .15s;
        }
        .pagination button:hover { background: var(--brand-blue); color: #fff; border-color: var(--brand-blue); }
        .pagination button.current { background: var(--brand-blue); color: #fff; border-color: var(--brand-blue); }
        .pagination button:disabled { opacity: .35; cursor: default; }
 
        .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: .9rem; }
 
        /* ── Alerts ── */
        .alert {
            padding: .8rem 1.1rem;
            border-radius: 9px;
            margin-bottom: 1rem;
            font-size: .85rem;
            font-weight: 500;
            display: none;
            border-left: 4px solid transparent;
        }
        .alert-success { background: #f0fdf4; color: #15803d; border-left-color: var(--success); }
        .alert-error   { background: #fff1f2; color: #b91c1c; border-left-color: var(--danger); }
 
        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(30,45,74,.45);
            backdrop-filter: blur(2px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 14px;
            padding: 1.8rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(26,86,219,.18);
            border: 1px solid var(--border);
        }
        .modal h3 { margin-bottom: .5rem; font-size: 1rem; color: var(--navy); }
        .modal p  { font-size: .87rem; color: var(--muted); margin-bottom: 1.3rem; }
        .modal-actions { display: flex; gap: .6rem; justify-content: flex-end; }
    </style>
</head>
<body>
 
<header class="topbar">
    <div class="topbar-brand">SNGuard</div>
    <div class="topbar-right">
        <span class="topbar-admin" id="admin-name">Carregando…</span>
        <button class="btn-logout" id="btn-logout">Sair</button>
    </div>
</header>
 
<div class="wrapper">
    <div class="alert alert-success" id="alert-ok"></div>
    <div class="alert alert-error"   id="alert-err"></div>
 
    <nav class="tabs">
        <button class="tab-btn active" data-tab="overview">Visão Geral</button>
        <button class="tab-btn"        data-tab="usuarios">Usuários</button>
        <button class="tab-btn"        data-tab="objetos">Objetos</button>
    </nav>
 
    <section class="tab-panel active" id="tab-overview">
        <div class="stats-grid" id="stats-grid">
            <div class="loading">Carregando métricas…</div>
        </div>
    </section>
 
    <section class="tab-panel" id="tab-usuarios">
        <div class="table-controls">
            <input type="search" id="u-busca" placeholder="Buscar por nome, e-mail ou CPF…" />
            <select id="u-status">
                <option value="todos">Todos os status</option>
                <option value="ativo">Ativos</option>
                <option value="inativo">Inativos</option>
            </select>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Nome</th><th>E-mail</th><th>CPF</th>
                        <th>Status</th><th>Admin</th><th>Objetos</th>
                        <th>Criado em</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="u-tbody">
                    <tr><td colspan="9" class="loading">Carregando…</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="u-pagination"></div>
        </div>
    </section>
 
    <section class="tab-panel" id="tab-objetos">
        <div class="table-controls">
            <input type="search" id="o-busca" placeholder="Buscar por descrição, serial ou dono…" />
            <select id="o-status">
                <option value="todos">Todos os status</option>
                <option value="normal">Normal</option>
                <option value="roubado">Roubado</option>
                <option value="perdido">Perdido</option>
            </select>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th>Descrição</th><th>Serial</th><th>Status</th>
                        <th>Dono</th><th>NF-e</th><th>Score</th>
                        <th>Cadastrado em</th><th>Ações</th>
                    </tr>
                </thead>
                <tbody id="o-tbody">
                    <tr><td colspan="9" class="loading">Carregando…</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="o-pagination"></div>
        </div>
    </section>
</div>
 
<div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
        <h3 id="modal-title">Confirmar ação</h3>
        <p  id="modal-text">Tem certeza?</p>
        <div class="modal-actions">
            <button class="btn-sm btn-secondary" id="modal-cancel">Cancelar</button>
            <button class="btn-sm btn-danger"    id="modal-confirm">Confirmar</button>
        </div>
    </div>
</div>
 
<script src="../js/validacoes.js"></script>
<script>
const BASE = '../../backend';
 
async function apiFetch(url, options = {}) {
    const res = await fetch(url, { credentials: 'same-origin', ...options });
    if (res.status === 401) { location.href = 'login.html'; return null; }
    if (res.status === 403) { showAlert('Acesso negado.', 'err'); return null; }
    return res.json();
}
 
function getCsrf() {
    return document.cookie.split('; ')
        .find(r => r.startsWith('csrf_token='))
        ?.split('=')[1] ?? '';
}
 
function showAlert(msg, type = 'ok') {
    const el = document.getElementById(type === 'ok' ? 'alert-ok' : 'alert-err');
    el.textContent = msg;
    el.style.display = 'block';
    setTimeout(() => (el.style.display = 'none'), 4000);
}
 
function fmt(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('pt-BR');
}
 
let _confirmResolve = null;
function confirm(title, text) {
    return new Promise(resolve => {
        _confirmResolve = resolve;
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-text').textContent  = text;
        document.getElementById('modal-backdrop').classList.add('open');
    });
}
document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('modal-backdrop').classList.remove('open');
    _confirmResolve?.(false);
});
document.getElementById('modal-confirm').addEventListener('click', () => {
    document.getElementById('modal-backdrop').classList.remove('open');
    _confirmResolve?.(true);
});
 
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        if (btn.dataset.tab === 'overview') loadStats();
        if (btn.dataset.tab === 'usuarios') loadUsuarios(1);
        if (btn.dataset.tab === 'objetos')  loadObjetos(1);
    });
});
 
document.getElementById('btn-logout').addEventListener('click', async () => {
    await fetch(`${BASE}/auth/logout.php`, { method: 'POST', credentials: 'same-origin' });
    location.href = 'login.html';
});
 
async function loadStats() {
    const data = await apiFetch(`${BASE}/admin/stats.php`);
    if (!data?.success) return;
    const t = data.data.totais;
    document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card green">
            <div class="label">Usuários ativos</div>
            <div class="value">${t.usuarios_ativos}</div>
        </div>
        <div class="stat-card">
            <div class="label">Total de usuários</div>
            <div class="value">${t.total_usuarios}</div>
        </div>
        <div class="stat-card">
            <div class="label">Total de objetos</div>
            <div class="value">${t.total_objetos}</div>
        </div>
        <div class="stat-card danger">
            <div class="label">Objetos roubados</div>
            <div class="value">${t.objetos_roubados}</div>
        </div>
        <div class="stat-card warn">
            <div class="label">Objetos perdidos</div>
            <div class="value">${t.objetos_perdidos}</div>
        </div>
        <div class="stat-card warn">
            <div class="label">Mensagens não lidas</div>
            <div class="value">${t.mensagens_nao_lidas}</div>
        </div>
        <div class="stat-card">
            <div class="label">Exclusões pendentes (LGPD)</div>
            <div class="value">${t.exclusoes_pendentes}</div>
        </div>
        <div class="stat-card">
            <div class="label">Administradores</div>
            <div class="value">${t.total_admins}</div>
        </div>
    `;
}
 
let uPage = 1;
async function loadUsuarios(page = 1) {
    uPage = page;
    const busca  = document.getElementById('u-busca').value;
    const status = document.getElementById('u-status').value;
    const params = new URLSearchParams({ page, per_page: 20, busca, status });
    const data = await apiFetch(`${BASE}/admin/usuarios.php?${params}`);
    if (!data?.success) return;
    const { usuarios, total, last_page } = data.data;
    const tbody = document.getElementById('u-tbody');
    if (!usuarios.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="loading">Nenhum usuário encontrado.</td></tr>';
        document.getElementById('u-pagination').innerHTML = '';
        return;
    }
    tbody.innerHTML = usuarios.map(u => `
        <tr>
            <td>${u.id}</td>
            <td>${esc(u.name)}</td>
            <td>${esc(u.email)}</td>
            <td>${esc(u.cpf)}</td>
            <td><span class="badge ${u.is_active ? 'badge-green' : 'badge-red'}">${u.is_active ? 'Ativo' : 'Inativo'}</span></td>
            <td>${u.is_admin ? '<span class="badge badge-blue">Admin</span>' : '<span class="badge badge-gray">Usuário</span>'}</td>
            <td>${u.total_objetos}</td>
            <td>${fmt(u.created_at)}</td>
            <td>
                ${u.is_active
                    ? `<button class="btn-sm btn-warning" onclick="acoesUsuario(${u.id},'desativar')">Desativar</button>`
                    : `<button class="btn-sm btn-success" onclick="acoesUsuario(${u.id},'ativar')">Ativar</button>`}
                ${u.is_admin
                    ? `<button class="btn-sm btn-secondary" onclick="acoesUsuario(${u.id},'rebaixar')">Rebaixar</button>`
                    : `<button class="btn-sm btn-primary" onclick="acoesUsuario(${u.id},'promover')">Promover</button>`}
                <button class="btn-sm btn-danger" onclick="acoesUsuario(${u.id},'excluir')">Excluir</button>
            </td>
        </tr>
    `).join('');
    renderPagination('u-pagination', page, last_page, loadUsuarios);
}
 
async function acoesUsuario(id, acao) {
    const labels = { ativar:'Ativar usuário', desativar:'Desativar usuário', promover:'Promover a admin', rebaixar:'Rebaixar admin', excluir:'Excluir usuário' };
    const ok = await confirm(labels[acao], `Confirma "${labels[acao]}" para o usuário #${id}?`);
    if (!ok) return;
    const data = await apiFetch(`${BASE}/admin/usuarios.php`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, acao, csrf: getCsrf() }),
    });
    if (data?.success) { showAlert(data.data.mensagem, 'ok'); loadUsuarios(uPage); }
    else showAlert(data?.message ?? 'Erro ao executar ação.', 'err');
}
 
let uDebounce;
document.getElementById('u-busca').addEventListener('input', () => { clearTimeout(uDebounce); uDebounce = setTimeout(() => loadUsuarios(1), 400); });
document.getElementById('u-status').addEventListener('change', () => loadUsuarios(1));
 
let oPage = 1;
const statusColors = { normal: 'badge-green', roubado: 'badge-red', perdido: 'badge-yellow' };
 
async function loadObjetos(page = 1) {
    oPage = page;
    const busca  = document.getElementById('o-busca').value;
    const status = document.getElementById('o-status').value;
    const params = new URLSearchParams({ page, per_page: 20, busca, status });
    const data = await apiFetch(`${BASE}/admin/objetos.php?${params}`);
    if (!data?.success) return;
    const { objetos, total, last_page } = data.data;
    const tbody = document.getElementById('o-tbody');
    if (!objetos.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="loading">Nenhum objeto encontrado.</td></tr>';
        document.getElementById('o-pagination').innerHTML = '';
        return;
    }
    tbody.innerHTML = objetos.map(o => `
        <tr>
            <td>${o.id}</td>
            <td title="${esc(o.descricao)}">${esc(o.descricao.slice(0,40))}${o.descricao.length>40?'…':''}</td>
            <td><code>${esc(o.serial_number)}</code></td>
            <td><span class="badge ${statusColors[o.status] ?? 'badge-gray'}">${o.status}</span></td>
            <td title="${esc(o.user_email)}">${esc(o.user_name)}</td>
            <td>${o.nfe_validada ? '<span class="badge badge-green">Validada</span>' : (o.nfe_chave ? '<span class="badge badge-yellow">Pendente</span>' : '—')}</td>
            <td>${o.score}</td>
            <td>${fmt(o.created_at)}</td>
            <td>
                <select class="btn-sm" onchange="alterarStatusObjeto(${o.id}, this)" style="padding:.28rem .5rem;border:1.5px solid var(--border);border-radius:6px;font-size:.75rem;font-family:inherit;background:var(--surface);color:var(--navy);">
                    <option value="">Mudar status…</option>
                    <option value="normal"  ${o.status==='normal'  ?'disabled':''}>Normal</option>
                    <option value="roubado" ${o.status==='roubado' ?'disabled':''}>Roubado</option>
                    <option value="perdido" ${o.status==='perdido' ?'disabled':''}>Perdido</option>
                </select>
                <button class="btn-sm btn-danger" onclick="acoesObjeto(${o.id},'excluir')">Excluir</button>
            </td>
        </tr>
    `).join('');
    renderPagination('o-pagination', page, last_page, loadObjetos);
}
 
async function alterarStatusObjeto(id, sel) {
    const novoStatus = sel.value;
    if (!novoStatus) return;
    sel.value = '';
    const ok = await confirm('Alterar status', `Mudar objeto #${id} para "${novoStatus}"?`);
    if (!ok) return;
    const data = await apiFetch(`${BASE}/admin/objetos.php`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, acao: 'alterar_status', status: novoStatus, csrf: getCsrf() }),
    });
    if (data?.success) { showAlert(data.data.mensagem, 'ok'); loadObjetos(oPage); }
    else showAlert(data?.message ?? 'Erro.', 'err');
}
 
async function acoesObjeto(id, acao) {
    const ok = await confirm('Excluir objeto', `Confirma exclusão do objeto #${id}? Esta ação é reversível apenas via banco.`);
    if (!ok) return;
    const data = await apiFetch(`${BASE}/admin/objetos.php`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, acao, csrf: getCsrf() }),
    });
    if (data?.success) { showAlert(data.data.mensagem, 'ok'); loadObjetos(oPage); }
    else showAlert(data?.message ?? 'Erro.', 'err');
}
 
let oDebounce;
document.getElementById('o-busca').addEventListener('input', () => { clearTimeout(oDebounce); oDebounce = setTimeout(() => loadObjetos(1), 400); });
document.getElementById('o-status').addEventListener('change', () => loadObjetos(1));
 
function renderPagination(containerId, current, last, cb) {
    const el = document.getElementById(containerId);
    if (last <= 1) { el.innerHTML = ''; return; }
    let html = `<span>Página ${current} de ${last}</span>`;
    html += `<button ${current===1?'disabled':''} onclick="${cb.name}(${current-1})">‹ Anterior</button>`;
    for (let p = Math.max(1, current-2); p <= Math.min(last, current+2); p++) {
        html += `<button class="${p===current?'current':''}" onclick="${cb.name}(${p})">${p}</button>`;
    }
    html += `<button ${current===last?'disabled':''} onclick="${cb.name}(${current+1})">Próxima ›</button>`;
    el.innerHTML = html;
}
 
function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
(async () => {
    const me = await apiFetch(`${BASE}/auth/me.php`);
    if (!me?.success) return;
    if (!me.data.is_admin) { location.href = 'dashboard.html'; return; }
    document.getElementById('admin-name').textContent = me.data.name;
    loadStats();
})();
</script>
