      <h1>Registrar novo produto</h1>

      <!--
        FORMULÁRIO DE CADASTRO DE PRODUTO
        action → backend/produto/cadastrar.php (POST)

        Segurança:
          - Rota protegida: backend/middleware/auth_guard.php verifica $_SESSION
          - CSRF token obrigatório
          - Vinculação automática: user_id vem da $_SESSION, NUNCA do formulário
          - Número de série: sanitizar com htmlspecialchars + trim
          - Upload de imagem (NF-e): validar MIME type real com finfo_file(), não extensão
            Tipos permitidos: image/jpeg, image/png, application/pdf
            Tamanho máximo: 5MB; armazenar fora do webroot
          - Rate limiting: máx. 10 cadastros / hora por usuário

        LGPD — Art. 9 (Transparência):
          Informar que os dados do produto são vinculados ao CPF do usuário
          e que o STATUS do produto (mas não dados pessoais) será público na busca.
        LGPD — Art. 18, VI (Exclusão de dados):
          Usuário pode excluir produtos via dashboard (soft delete — objects.deleted_at).
      -->
      <form id="form-produto" action="../../backend/produto/cadastrar.php"
            method="POST" enctype="multipart/form-data" novalidate>
