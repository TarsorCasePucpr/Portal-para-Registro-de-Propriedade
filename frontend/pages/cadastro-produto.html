<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Cadastro de Produto</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <a href="dashboard.html" class="logo-text">SN<span style="color:#fff">Guard</span></a>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="cadastro-produto.html" class="active">Novo Produto</a>
      <a href="meus-dados.html">Perfil</a>
      <a href="../../backend/auth/logout.php" id="btn-logout" style="color:var(--danger); font-size:.875rem;">Sair</a>
    </nav>
  </header>

  <main style="align-items:flex-start; justify-content:center;">
    <section id="cadastro-produto-section" style="max-width:600px;">

      <div style="margin-bottom:1.5rem;">
        <a href="dashboard.html" style="font-size:.875rem; color:var(--text-muted); display:inline-flex; gap:.375rem;">
          ← Voltar ao painel
        </a>
        <h1>Registrar novo produto</h1>
        <p>Adicione seu produto ao SNGuard para protegê-lo.</p>
      </div>

      <form id="form-produto" enctype="multipart/form-data">

        <input type="hidden" id="csrf-produto" name="csrf">

        <!-- NF -->
        <div class="campo">
          <label>Chave da NF (44 dígitos)</label>
          <input type="text" id="nfe-chave" maxlength="44">
          <button type="button" id="btn-consultar-nf">Consultar</button>
          <span id="erro-nfe" class="erro"></span>
        </div>

        <!-- Descrição -->
        <div class="campo">
          <label>Descrição</label>
          <textarea id="descricao" maxlength="500"></textarea>
          <span id="erro-descricao" class="erro"></span>
        </div>

        <!-- Serial -->
        <div class="campo">
          <label>Número de Série</label>
          <input type="text" id="serial">
          <span id="erro-serial" class="erro"></span>
        </div>

        <!-- Data -->
        <div class="campo">
          <label>Data de compra</label>
          <input type="date" id="data-compra">
        </div>

        <!-- Termos -->
        <div class="campo-check">
          <input type="checkbox" id="aceite-termos">
          <label>Declaro que sou o proprietário legítimo</label>
        </div>

        <button type="submit" id="btn-cadastrar-produto" disabled>
          Registrar produto
        </button>

        <div id="msg-cadastro"></div>

      </form>

    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html">Política de Privacidade</a>
    <a href="termo_de_uso.html">Termos de Uso</a>
  </footer>

  <script src="../js/validacoes.js" defer></script>
  <script src="../js/main.js" defer></script>

  <script>
    // liberar botão
    document.getElementById('aceite-termos').addEventListener('change', function () {
      document.getElementById('btn-cadastrar-produto').disabled = !this.checked;
    });
  </script>

</body>
</html>
