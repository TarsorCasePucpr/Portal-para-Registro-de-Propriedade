<script>
(function () {

  const form       = document.getElementById('form-produto');
  const btn        = document.getElementById('btn-cadastrar-produto');
  const descricao  = document.getElementById('descricao');
  const contador   = document.getElementById('contador-descricao');
  const msg        = document.getElementById('msg-cadastro');

  document.getElementById('data-compra').max =
    new Date().toISOString().split('T')[0];

  descricao.addEventListener('input', () => {
    contador.textContent = descricao.value.length + ' / 500 caracteres';
  });

  document.getElementById('aceite-termos').addEventListener('change', function () {
    btn.disabled = !this.checked;
  });

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    let valido = true;

    const desc = descricao.value.trim();
    const serial = document.getElementById('serial').value.trim();
    const aceite = document.getElementById('aceite-termos').checked;
    const nfe = document.getElementById('nfe-chave').value.replace(/\D/g, '');

    ['erro-descricao','erro-serial','erro-termos','erro-nfe']
      .forEach(id => document.getElementById(id).textContent = '');

    if (!desc || desc.length < 5) {
      document.getElementById('erro-descricao').textContent = 'Descrição inválida.';
      valido = false;
    }

    if (!serial || serial.length < 3) {
      document.getElementById('erro-serial').textContent = 'Serial inválido.';
      valido = false;
    }

    if (nfe && nfe.length !== 44) {
      document.getElementById('erro-nfe').textContent = 'NF inválida.';
      valido = false;
    }

    if (!aceite) {
      document.getElementById('erro-termos').textContent = 'Aceite obrigatório.';
      valido = false;
    }

    if (!valido) return;

    btn.disabled = true;
    btn.textContent = 'Registrando...';

    try {
      const fd = new FormData(form);
      const res = await fetch('../../backend/produto/cadastrar.php', {
        method: 'POST',
        body: fd
      });

      const data = await res.json();

      if (data.success) {
        msg.style.color = 'green';
        msg.textContent = 'Produto registrado!';
        setTimeout(() => location.href = 'dashboard.html', 1500);
      } else {
        throw new Error(data.error);
      }

    } catch (err) {
      msg.style.color = 'red';
      msg.textContent = err.message || 'Erro ao cadastrar';
      btn.disabled = false;
      btn.textContent = 'Registrar produto';
    }
  });

  document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    const csrf = document.getElementById('csrf-produto').value;
    window.location.href =
      '../../backend/auth/logout.php?csrf=' + encodeURIComponent(csrf);
  });

})();
</script>
