<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Cadastro de Usuário</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <a href="index.html">
      <img src="../img/logo.png" alt="SNGuard" onerror="this.style.display='none'">
    </a>
  </header>

  <main>
    <section id="cadastro-section">
      <h1>Criar conta SNGuard</h1>

      <div id="msg-servidor" role="alert"></div>

      <form id="form-cadastro" action="../../backend/auth/register.php" method="POST" novalidate>

        <input type="hidden" id="csrf-token" name="csrf" value="">

        <div class="campo">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            required
            maxlength="100"
            autocomplete="name"
            placeholder="Seu nome completo"
          >
          <span class="erro" id="erro-nome" role="alert"></span>
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            maxlength="255"
            autocomplete="email"
            placeholder="seu@email.com"
          >
          <span class="erro" id="erro-email" role="alert"></span>
        </div>

        <div class="campo">
          <label for="cpf">CPF</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            required
            maxlength="14"
            autocomplete="off"
            placeholder="000.000.000-00"
            inputmode="numeric"
          >
          <small>Necessário para validar propriedade via Nota Fiscal Eletrônica (NF-e)</small>
          <span class="erro" id="erro-cpf" role="alert"></span>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <div class="campo-senha">
            <input
              type="password"
              id="senha"
              name="senha"
              required
              maxlength="255"
              autocomplete="new-password"
              placeholder="Mínimo 12 caracteres"
            >
            <button type="button" id="toggle-senha" aria-label="Mostrar senha">
              Mostrar
            </button>
          </div>
          <div id="forca-senha" aria-live="polite"></div>
          <small>Mín. 12 caracteres: maiúscula, minúscula, número e símbolo (@$!%*?&)</small>
          <span class="erro" id="erro-senha" role="alert"></span>
        </div>

        <div class="campo">
          <label for="confirmar-senha">Confirmar senha</label>
          <div class="campo-senha">
            <input
              type="password"
              id="confirmar-senha"
              required
              maxlength="255"
              autocomplete="new-password"
              placeholder="Repita sua senha"
            >
            <button type="button" id="toggle-confirmar" aria-label="Mostrar confirmação">
              Mostrar
            </button>
          </div>
          <span class="erro" id="erro-confirmar" role="alert"></span>
        </div>

        <div id="consentimento-lgpd" class="campo">
          <label class="label-checkbox">
            <input type="checkbox" id="aceite-lgpd" name="aceite_lgpd" value="1" required>
            Li e concordo com a
            <a href="politica_privavidade.html" target="_blank" rel="noopener">Política de Privacidade</a>
            e autorizo o uso dos meus dados para os fins descritos.
          </label>
          <span class="erro" id="erro-lgpd" role="alert"></span>
        </div>

        <div id="msg-erro" role="alert" aria-live="polite"></div>

        <button type="submit" id="btn-cadastrar" disabled>Criar conta</button>

        <div class="links-aux">
          <a href="login.html">Já tenho conta</a>
        </div>

      </form>
    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html">Política de Privacidade</a>
    <a href="termo_de_uso.html">Termos de Uso</a>
  </footer>

  <script src="../js/validacoes.js" defer></script>
  <script src="../js/main.js" defer></script>

</body>
</html>
