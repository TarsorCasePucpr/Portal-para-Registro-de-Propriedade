<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Cadastro de Usuário</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- ===== CABEÇALHO ===== -->
  <header>
    <!-- TODO: Logo SNGuard + link para index.html -->
     <a href="index.html">
        <img src="logo.png">
    </a>
  </header>

  <main>
    <section id="cadastro-section">
      <h1>Criar conta SNGuard</h1>

      <!--
        FORMULÁRIO DE CADASTRO DE USUÁRIO
        action → backend/auth/register.php (POST)
        Segurança:
          - Campo CSRF oculto gerado por backend/middleware/csrf.php
          - Validações client-side via validacoes.js (regex: email, CPF, senha forte)
          - Senhas: NUNCA enviadas para validação visual no backend — só hash bcrypt cost 13
          - CPF: usado para vinculação NF-e; armazenar apenas formato "000.000.000-00"
        LGPD:
          - Art. 7, I (Consentimento): checkbox obrigatório antes de submeter
          - Art. 9 (Transparência): informar finalidade de cada dado coletado
          - Art. 18 (Direitos do titular): link para política de privacidade
      -->
      <form id="form-cadastro" action="../../backend/auth/register.php" method="POST" novalidate>
        <input type="hidden" name="csrf" value="[gerado pelo PHP]">

        
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" required maxlength="100" autocomplete="name" placeholder="Seu nome completo">

        
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required maxlength="255" autocomplete="email" placeholder="seu@email.com">

        
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" required maxlength="14" autocomplete="off" placeholder="000.000.000-00" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}">
        <small>Necessário para validar propriedade via Nota Fiscal Eletrônica (NF-e)</small>

        <!-- TODO: Input senha com indicador de força -->
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required maxlength="255" autocomplete="new-password" pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{12,}">
        <div id="forca-senha" aria-live="polite">Fraca | Média | Forte</div>
        <small>Mín. 12 caracteres, maiúscula, minúscula, número e símbolo</small>

        <!-- TODO: Input confirmar senha (validação JS apenas — NÃO enviada ao PHP) -->
        <!-- <label for="confirmar-senha">Confirmar senha</label>
             <input type="password" id="confirmar-senha" required
                    maxlength="255" autocomplete="new-password"> -->

        <!-- ===== CONSENTIMENTO LGPD — Art. 7, I ===== -->
        <!--
          LGPD — Art. 7, I (Controle de consentimento):
          Checkbox obrigatório — sem consentimento, o formulário não é submetido.
          O backend (register.php) também deve verificar este campo.
          LOG de consentimento: gravar timestamp + IP + versão da política na tabela lgpd_consent.
        -->
        <!-- <div id="consentimento-lgpd">
               <input type="checkbox" id="aceite-lgpd" name="aceite_lgpd" value="1" required>
               <label for="aceite-lgpd">
                 Li e concordo com a
                 <a href="#" target="_blank" rel="noopener">Política de Privacidade</a>
                 e autorizo o uso dos meus dados para as finalidades descritas.
               </label>
             </div> -->

        <!-- TODO: Botão submit desabilitado até LGPD ser aceito (JS) -->
        <!-- <button type="submit" id="btn-cadastrar" disabled>Criar conta</button> -->

        
        <a href="login.html">Já tenho conta</a> -->
      </form>
    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html#politica">Politica de Privacidade</a>
    <a href="termo_de_uso.html#termo">Termo de Uso</a>
  </footer>

  <script src="../js/validacoes.js" defer></script>
  <script src="../js/main.js" defer></script>
</body>
</html>
