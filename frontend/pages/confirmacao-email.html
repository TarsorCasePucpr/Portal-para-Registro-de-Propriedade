<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — E-mail Confirmado</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <a href="index.html" class="logo-text">SN<span style="color:#fff">Guard</span></a>
  </header>

  <main>
    <section id="confirmacao-section">
      <div class="card" style="text-align:center; padding:2.5rem; max-width:440px; margin:2rem auto;">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" style="margin:0 auto 1rem;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <h1 style="font-size:1.5rem; margin-bottom:.5rem;">E-mail confirmado!</h1>
        <p style="color:var(--texto-leve); margin-bottom:1.75rem;">
          Sua conta foi ativada com sucesso. Agora você já pode fazer login.
        </p>
        <a href="login.html" style="
          display:inline-flex; align-items:center; justify-content:center;
          background:var(--azul); color:#fff; border-radius:var(--raio-sm);
          padding:.7rem 2rem; font-weight:600; font-size:1rem; text-decoration:none;">
          Ir para o login
        </a>
      </div>
    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html">Política de Privacidade</a>
    <a href="termo_de_uso.html">Termos de Uso</a>
  </footer>

</body>
</html>
