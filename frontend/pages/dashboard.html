<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Meu Painel</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-body">

  <!-- SIDEBAR -->
  <nav id="sidebar" aria-label="Navegação principal">

    <div class="sidebar-logo">
      <a href="dashboard.html" style="text-decoration:none;">
        <span>SN<span style="color:#fff">Guard</span></span>
      </a>
    </div>

    <nav role="navigation">
      <a href="dashboard.html" class="active" aria-current="page">
        Dashboard
      </a>

      <a href="cadastro-produto.html">Novo produto</a>
      <a href="busca.html">Consultar serial</a>
      <a href="meus-dados.html">Meu perfil</a>

      <a href="mfa.html" id="link-mfa" hidden>
        Ativar 2FA
        <span style="font-size:.7rem; color:var(--warn); margin-left:auto;">Recomendado</span>
      </a>
    </nav>

    <div class="sidebar-bottom">
      <a href="../../backend/auth/logout.php" id="btn-logout">
        Sair
      </a>
    </div>

  </nav>

  <!-- CONTEÚDO PRINCIPAL -->
  <div id="dashboard-main">

    <header id="dashboard-header">
      <div>
        <h1 id="saudacao">Olá!</h1>
        <p id="resumo-conta">Carregando...</p>
      </div>

      <div>
        <a href="busca.html">Consultar S/N</a>
        <a href="cadastro-produto.html">Novo produto</a>
      </div>
    </header>

    <div class="dashboard-content">

      <!-- BUSCA -->
      <section>
        <input id="dash-serial-input" placeholder="Digite um número de série">
        <button id="dash-btn-buscar">Verificar</button>
        <div id="dash-resultado"></div>
      </section>

      <!-- STATS -->
      <div id="stats-bar">
        <div>Produtos: <span id="stat-total">—</span></div>
        <div>Alertas: <span id="stat-alertas">—</span></div>
        <div>Mensagens: <span id="stat-msgs">—</span></div>
      </div>

      <!-- NOTIFICAÇÕES -->
      <section id="secao-notificacoes" hidden>
        <div id="lista-notificacoes"></div>
      </section>

      <!-- PRODUTOS -->
      <section>
        <div id="lista-produtos"></div>
      </section>

      <!-- EXCLUSÃO -->
      <section id="exclusao-conta">
        <h2>Privacidade e exclusão de dados</h2>
        <p>Você pode solicitar a exclusão dos seus dados.</p>
        <a href="exclusao-conta.html">Solicitar exclusão</a>
      </section>

    </div>
  </div>

  <script src="../js/validacoes.js" defer></script>
  <script src="../js/main.js" defer></script>

  <script>
  (function () {

    let csrfToken = '';
    let produtoAtualId = null;

    fetch('../../backend/auth/get_csrf.php')
      .then(r => r.json())
      .then(d => { csrfToken = d.csrf || ''; });

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = '../../backend/auth/logout.php?csrf=' + encodeURIComponent(csrfToken);
    });

    fetch('../../backend/auth/me.php')
      .then(r => r.json())
      .then(function (d) {
        if (!d.success) {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('saudacao').textContent = 'Olá, ' + (d.name || 'usuário');

        if (!d.mfa_enabled) {
          document.getElementById('link-mfa').hidden = false;
        }

        carregarProdutos();
      });

    function carregarProdutos() {
      fetch('../../backend/produto/listar.php')
        .then(r => r.json())
        .then(function (d) {
          const lista = document.getElementById('lista-produtos');

          if (!d.success || !d.produtos) {
            lista.innerHTML = 'Nenhum produto.';
            return;
          }

          lista.innerHTML = d.produtos.map(p => '<div>' + p.descricao + '</div>').join('');
        });
    }

    document.getElementById('dash-btn-buscar').addEventListener('click', function () {
      const serial = document.getElementById('dash-serial-input').value;

      fetch('../../backend/produto/buscar.php?serial=' + encodeURIComponent(serial))
        .then(r => r.json())
        .then(d => {
          document.getElementById('dash-resultado').innerHTML =
            d.encontrado ? 'Encontrado' : 'Não encontrado';
        });
    });

  })();
  </script>

</body>
</html>
