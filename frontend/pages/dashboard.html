  <div class="card">
    <h2>Alterar status</h2>
    <p id="modal-status-desc"></p>

    <button id="modal-btn-normal">Normal</button>
    <button id="modal-btn-perdido">Perdido</button>
    <button id="modal-btn-roubado">Roubado</button>
    <button id="modal-btn-cancelar">Cancelar</button>

    <div id="modal-erro" class="erro"></div>
  </div>
</div>

<script>
(function () {

  const csrfToken = '<?= htmlspecialchars($_csrf, ENT_QUOTES, 'UTF-8') ?>';
  let produtoAtualId = null;

  document.getElementById('btn-logout').onclick = function (e) {
    e.preventDefault();
    window.location.href = '../../backend/auth/logout.php?csrf=' + encodeURIComponent(csrfToken);
  };

  // Verifica sessão
  fetch('../../backend/auth/me.php')
    .then(r => r.json())
    .then(d => {
      if (!d.success) {
        window.location.href = 'login.html';
        return;
      }
      carregarProdutos();
    })
    .catch(() => window.location.href = 'login.html');

  function carregarProdutos() {
    fetch('../../backend/produto/listar.php')
      .then(r => r.json())
      .then(d => {
        const lista = document.getElementById('lista-produtos');

        if (!d.success || !d.produtos.length) {
          lista.innerHTML = '<p>Nenhum produto cadastrado.</p>';
          return;
        }

        lista.innerHTML = d.produtos.map(renderCard).join('');

        document.querySelectorAll('[data-status]').forEach(btn => {
          btn.onclick = () => {
            produtoAtualId = btn.dataset.id;
            document.getElementById('modal-status').hidden = false;
          };
        });

        document.querySelectorAll('[data-excluir]').forEach(btn => {
          btn.onclick = () => {
            if (confirm('Excluir produto?')) excluirProduto(btn.dataset.id);
          };
        });
      });
  }

  function renderCard(p) {
    return `
      <div class="produto-card">
        <strong>${esc(p.descricao)}</strong><br>
        <small>${esc(p.serial_number)}</small><br>
        <span>${p.status}</span><br><br>

        <button data-status data-id="${p.id}">Alterar status</button>
        <button data-excluir data-id="${p.id}">Excluir</button>
      </div>
    `;
  }

  // Modal
  document.getElementById('modal-btn-cancelar').onclick = fecharModal;
  document.getElementById('modal-btn-normal').onclick   = () => alterarStatus('normal');
  document.getElementById('modal-btn-perdido').onclick  = () => alterarStatus('perdido');
  document.getElementById('modal-btn-roubado').onclick  = () => alterarStatus('roubado');

  function fecharModal() {
    document.getElementById('modal-status').hidden = true;
    produtoAtualId = null;
  }

  function alterarStatus(status) {
    const fd = new FormData();
    fd.append('id', produtoAtualId);
    fd.append('status', status);
    fd.append('csrf', csrfToken);

    fetch('../../backend/produto/status.php', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        if (d.success) {
          fecharModal();
          carregarProdutos();
        } else {
          document.getElementById('modal-erro').textContent = d.error;
        }
      });
  }

  function excluirProduto(id) {
    const fd = new FormData();
    fd.append('id', id);
    fd.append('csrf', csrfToken);

    fetch('../../backend/produto/cadastrar.php', { method: 'POST', body: fd })
      .then(r => r.json())
      .then(d => {
        if (d.success) carregarProdutos();
        else alert(d.error);
      });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

})();
</script>
