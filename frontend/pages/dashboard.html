  <script defer>
  (function () {

    const csrfToken = '<?= htmlspecialchars($_csrf, ENT_QUOTES, 'UTF-8') ?>';
    let produtoAtualId = null;

    document.getElementById('btn-logout').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = '../../backend/auth/logout.php?csrf=' + encodeURIComponent(csrfToken);
    });

    fetch('../../backend/auth/me.php')
      .then(r => r.json())
      .then(function (d) {
        if (!d.success) {
          window.location.href = 'login.html';
          return;
        }
        carregarProdutos();
      })
      .catch(function () {
        window.location.href = 'login.html';
      });

    function carregarProdutos() {
      fetch('../../backend/produto/listar.php')
        .then(r => r.json())
        .then(function (d) {
          const lista = document.getElementById('lista-produtos');

          if (!d.success || !d.produtos || d.produtos.length === 0) {
            lista.innerHTML = estadoVazio();
            return;
          }

          lista.innerHTML = '<div class="produtos-grid">' +
            d.produtos.map(renderCard).join('') +
          '</div>';

          lista.querySelectorAll('[data-btn-status]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              produtoAtualId = this.dataset.id;
              document.getElementById('modal-status-desc').textContent =
                'Produto: ' + (this.dataset.nome || produtoAtualId);
              document.getElementById('modal-status').hidden = false;
            });
          });

          lista.querySelectorAll('[data-btn-excluir]').forEach(function (btn) {
            btn.addEventListener('click', function () {
              if (!confirm('Tem certeza? O produto será removido. A exclusão permanente ocorre após 30 dias (LGPD).')) return;
              excluirProduto(this.dataset.id);
            });
          });
        })
        .catch(function () {
          document.getElementById('lista-produtos').innerHTML =
            '<p class="erro">Não foi possível carregar os produtos.</p>';
        });
    }

    function renderCard(p) {
      const statusBadge = p.status === 'roubado'
        ? '<span class="badge badge-vermelho">Roubado</span>'
        : p.status === 'perdido'
          ? '<span class="badge badge-warn">Perdido</span>'
          : '<span class="badge badge-verde">Protegido</span>';

      const serialMask = p.serial_number
        ? p.serial_number.slice(0, 4) + '••••' + p.serial_number.slice(-4)
        : '—';

      return (
        '<div class="produto-card' + (p.status === 'roubado' || p.status === 'perdido' ? ' alerta' : '') + '">' +
          statusBadge +
          '<div class="prod-nome">' + escHtml(p.descricao || 'Sem descrição') + '</div>' +
          '<div class="prod-serial">' + escHtml(serialMask) + '</div>' +
          '<div class="prod-acoes">' +
            '<button type="button" class="btn btn-secondary btn-sm" data-btn-status data-id="' + p.id + '" data-nome="' + escHtml(p.descricao || '') + '">Alterar status</button>' +
            '<button type="button" class="btn-danger btn-sm" data-btn-excluir data-id="' + p.id + '">Excluir</button>' +
          '</div>' +
        '</div>'
      );
    }

    function estadoVazio() {
      return (
        '<div class="estado-vazio">' +
          '<p>Nenhum produto registrado ainda.</p>' +
          '<a href="cadastro-produto.html" style="margin-top:.75rem; display:inline-block;">Registrar primeiro produto</a>' +
        '</div>'
      );
    }

    const modal     = document.getElementById('modal-status');
    const modalErro = document.getElementById('modal-erro');

    function fecharModal() { modal.hidden = true; produtoAtualId = null; modalErro.textContent = ''; }

    document.getElementById('modal-btn-cancelar').addEventListener('click', fecharModal);
    modal.addEventListener('click', function (e) { if (e.target === this) fecharModal(); });

    ['normal', 'perdido', 'roubado'].forEach(function (status) {
      document.getElementById('modal-btn-' + status).addEventListener('click', function () {
        alterarStatus(produtoAtualId, status);
      });
    });

    function alterarStatus(id, status) {
      modalErro.textContent = '';
      const fd = new FormData();
      fd.append('id', id);
      fd.append('status', status);
      fd.append('csrf', csrfToken);

      fetch('../../backend/produto/status.php', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(function (d) {
          if (d.success) { fecharModal(); carregarProdutos(); }
          else modalErro.textContent = d.error || 'Erro ao alterar status.';
        })
        .catch(function () { modalErro.textContent = 'Erro de conexão.'; });
    }

    function excluirProduto(id) {
      const fd = new FormData();
      fd.append('acao', 'excluir');
      fd.append('id', id);
      fd.append('csrf', csrfToken);

      fetch('../../backend/produto/cadastrar.php', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(function (d) {
          if (d.success) carregarProdutos();
          else alert(d.error || 'Erro ao excluir produto.');
        })
        .catch(function () { alert('Erro de conexão.'); });
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

  })();
  </script>
