      <h1>Entrar na sua conta</h1>

      <!--
        FORMULÁRIO DE LOGIN
        action → backend/auth/login.php (POST)
        Segurança:
          - Campo CSRF oculto gerado por backend/middleware/csrf.php
          - Campos com autocomplete="email" e autocomplete="current-password"
          - Rate limiting: máx. 5 tentativas / 15 min por IP (backend/middleware/rate_limiter.php)
          - Mensagens de erro genéricas: NUNCA revelar se e-mail existe ou não
            (evita enumeração de usuários — OWASP A07:2021)
        LGPD — Art. 9 (Transparência): informar ao usuário quais dados são usados no login
      -->
      <form id="form-login" action="../../backend/auth/login.php" method="POST" novalidate>
