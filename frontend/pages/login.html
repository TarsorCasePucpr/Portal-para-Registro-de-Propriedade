<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Login</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header>
    <a href="index.html">
      <img src="../img/logo.png" alt="SNGuard" onerror="this.style.display='none'">
    </a>
  </header>

  <main>
    <section id="login-section">
      <h1>Entrar na sua conta</h1>

      <div id="msg-servidor" role="alert"></div>

      <form id="form-login" action="../../backend/auth/login.php" method="POST" novalidate>

        <input type="hidden" id="csrf-token" name="csrf" value="">

        <div class="campo">
          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            maxlength="255"
            autocomplete="email"
            placeholder="seu@email.com"
          >
          <span class="erro" id="erro-email" role="alert"></span>
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <div class="campo-senha">
            <input
              type="password"
              id="senha"
              name="senha"
              required
              maxlength="255"
              autocomplete="current-password"
              placeholder="Sua senha"
            >
            <button type="button" id="toggle-senha" aria-label="Mostrar senha">
              Mostrar
            </button>
          </div>
          <span class="erro" id="erro-senha" role="alert"></span>
        </div>

        <div id="msg-erro" role="alert" aria-live="polite"></div>

        <button type="submit" id="btn-login">Entrar</button>

        <div class="links-aux">
          <a href="recuperacao-senha.html">Esqueceu sua senha?</a>
          <a href="cadastro-usuario.html">Criar conta</a>
        </div>

      </form>
    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html">Política de Privacidade</a>
    <a href="termo_de_uso.html">Termos de Uso</a>
  </footer>

  <script src="../js/validacoes.js" defer></script>
  <script src="../js/main.js" defer></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const erroServidor = params.get('erro');
    if (erroServidor) {
      document.getElementById('msg-servidor').textContent = decodeURIComponent(erroServidor);
    }
  </script>

</body>
</html>
