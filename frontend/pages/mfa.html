<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Verificação em Dois Fatores</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    #codigo {
      font-size: 1.5rem; letter-spacing: .5rem; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .aviso-tentativas { font-size: .85rem; color: #b45309; margin-top: .4rem; }
    .instrucao-totp {
      background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 6px;
      padding: .75rem 1rem; color: #1e40af; font-size: .875rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">
      <img src="../img/logo.png" alt="SNGuard" onerror="this.style.display='none'">
    </a>
  </header>

  <main>
    <section id="mfa-section">
      <h1>Verificação em dois fatores</h1>

      <div id="msg-servidor" role="alert" aria-live="polite"></div>

      <div class="instrucao-totp">
        Abra seu <strong>app autenticador</strong> (Google Authenticator, Authy ou similar)
        e digite o código de 6 dígitos gerado para <strong>SNGuard</strong>.
      </div>

      <form id="form-mfa" action="../../backend/auth/mfa.php" method="POST" novalidate>
        <input type="hidden" id="csrf" name="csrf">

        <div class="campo">
          <label for="codigo">Código de verificação</label>
          <input
            type="text"
            id="codigo"
            name="code"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            minlength="6"
            autocomplete="one-time-code"
            placeholder="000000"
            required
          >
          <span id="msg-erro" class="erro" role="alert" aria-live="polite"></span>
        </div>

        <button type="submit" id="btn-verificar">Verificar</button>
        <p class="aviso-tentativas">Máximo 3 tentativas por 10 minutos.</p>
      </form>

    </section>
  </main>

  <footer>
    <a href="politica_privavidade.html">Política de Privacidade</a>
    <a href="termo_de_uso.html">Termos de Uso</a>
  </footer>

  <script defer>
    (function () {
      const csrfInput  = document.getElementById('csrf');
      const msgServidor = document.getElementById('msg-servidor');
      const msgErro    = document.getElementById('msg-erro');
      const form       = document.getElementById('form-mfa');
      const btnVerif   = document.getElementById('btn-verificar');

      const params = new URLSearchParams(window.location.search);
      if (params.get('erro')) {
        msgServidor.textContent = decodeURIComponent(params.get('erro'));
      }

      fetch('../../backend/auth/get_csrf.php')
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.csrf) csrfInput.value = d.csrf; })
        .catch(function () {
          msgServidor.textContent = 'Erro ao carregar o formulário. Recarregue a página.';
        });

      form.addEventListener('submit', function (e) {
        const codigo = document.getElementById('codigo').value.trim();
        if (!/^\d{6}$/.test(codigo)) {
          e.preventDefault();
          msgErro.textContent = 'O código deve ter exatamente 6 dígitos numéricos.';
          return;
        }
        btnVerif.disabled    = true;
        btnVerif.textContent = 'Verificando...';
      });
    })();
  </script>

</body>
</html>
