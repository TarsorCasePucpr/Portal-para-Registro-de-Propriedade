<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNGuard — Recuperar Senha</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <a href="index.html" class="logo-texto">SNGuard</a>
  <nav>
    <a href="busca.html">Busca Pública</a> |
    <a href="login.html">Login</a> |
    <a href="cadastro-usuario.html">Cadastrar-se</a>
  </nav>
</header>

<main>
<section id="recuperacao-section">

  <!-- Steps -->
  <div class="steps" id="steps-indicator">
    <div class="step-dot active" id="dot-1"></div>
    <div class="step-dot" id="dot-2"></div>
    <div class="step-dot" id="dot-3"></div>
  </div>

  <!-- PASSO 1 -->
  <div id="passo-1">
    <h1>Recuperar senha</h1>
    <p>Informe seu e-mail para receber o link de recuperação.</p>

    <form id="form-recuperacao">
      <input type="hidden" id="csrf-recuperacao" name="csrf">

      <div class="campo">
        <label>E-mail</label>
        <input type="email" id="email" required maxlength="255">
        <span id="erro-email" class="erro"></span>
      </div>

      <button type="submit" id="btn-enviar">Enviar link</button>
    </form>
  </div>

  <!-- PASSO 2 (MFA OPCIONAL) -->
  <div id="passo-2" hidden>
    <h1>Verificação MFA</h1>
    <p>Digite o código de 6 dígitos.</p>

    <form id="form-mfa">
      <input type="hidden" id="csrf-mfa">
      <input type="hidden" id="email-mfa">

      <div class="mfa-digits">
        <input maxlength="1"><input maxlength="1"><input maxlength="1">
        <input maxlength="1"><input maxlength="1"><input maxlength="1">
      </div>

      <span id="erro-mfa" class="erro"></span>

      <button type="submit" id="btn-mfa">Confirmar</button>
      <button type="button" id="btn-voltar-mfa">Voltar</button>
    </form>
  </div>

  <!-- PASSO 3 -->
  <div id="passo-3" hidden>
    <div class="card">
      <h1>Link enviado!</h1>
      <p id="msg-email-enviado"></p>

      <button id="btn-reenviar">Reenviar e-mail</button>
      <div id="msg-reenvio"></div>
    </div>
  </div>

</section>
</main>

<footer>
  <a href="politica_privacidade.html">Política de Privacidade</a> |
  <a href="termo_de_uso.html">Termos de Uso</a>
</footer>

<script>
(function () {

  const passo1 = document.getElementById('passo-1');
  const passo2 = document.getElementById('passo-2');
  const passo3 = document.getElementById('passo-3');

  const dots = [
    document.getElementById('dot-1'),
    document.getElementById('dot-2'),
    document.getElementById('dot-3'),
  ];

  let emailGlobal = '';

  function irParaPasso(n) {
    [passo1, passo2, passo3].forEach((el, i) => el.hidden = i !== n - 1);
    dots.forEach((d, i) => {
      d.classList.toggle('active', i === n - 1);
      d.classList.toggle('done', i < n - 1);
    });
  }

  // CSRF
  fetch('../../backend/auth/get_csrf.php')
    .then(r => r.json())
    .then(d => {
      document.getElementById('csrf-recuperacao').value = d.csrf;
      document.getElementById('csrf-mfa').value = d.csrf;
    });

  // RECUPERAÇÃO
  document.getElementById('form-recuperacao').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const erro  = document.getElementById('erro-email');
    const btn   = document.getElementById('btn-enviar');

    erro.textContent = '';

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      erro.textContent = 'E-mail inválido';
      return;
    }

    emailGlobal = email;
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const fd = new FormData(e.target);
      const res = await fetch('../../backend/auth/recover.php', { method: 'POST', body: fd });
      const data = await res.json();

      if (data.mfa_required) {
        document.getElementById('email-mfa').value = email;
        irParaPasso(2);
      } else {
        mostrar(email);
      }

    } catch {
      mostrar(email);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enviar link';
    }
  });

  // MFA
  const inputs = [...document.querySelectorAll('.mfa-digits input')];

  inputs.forEach((i, idx) => {
    i.addEventListener('input', () => {
      i.value = i.value.replace(/\D/g, '');
      if (i.value && inputs[idx + 1]) inputs[idx + 1].focus();
    });
  });

  document.getElementById('form-mfa').addEventListener('submit', async (e) => {
    e.preventDefault();

    const codigo = inputs.map(i => i.value).join('');
    const erro = document.getElementById('erro-mfa');

    if (codigo.length !== 6) {
      erro.textContent = 'Código inválido';
      return;
    }

    const fd = new FormData();
    fd.append('acao', 'verificar_mfa_recuperacao');
    fd.append('email', emailGlobal);
    fd.append('codigo', codigo);

    const res = await fetch('../../backend/auth/recover.php', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.success) {
      mostrar(emailGlobal);
    } else {
      erro.textContent = 'Código incorreto';
    }
  });

  document.getElementById('btn-voltar-mfa').onclick = () => irParaPasso(1);

  function mostrar(email) {
    document.getElementById('msg-email-enviado').innerHTML =
      `Se o e-mail <strong>${email}</strong> existir, o link foi enviado.`;

    irParaPasso(3);
  }

  // REENVIO
  let count = 0;

  document.getElementById('btn-reenviar').onclick = async function () {
    if (count++ >= 3) return alert('Limite atingido');

    const fd = new FormData();
    fd.append('acao', 'reenviar');
    fd.append('email', emailGlobal);

    await fetch('../../backend/auth/recover.php', { method: 'POST', body: fd });

    document.getElementById('msg-reenvio').textContent =
      'E-mail reenviado com sucesso!';
  };

})();
</script>

</body>
</html>
