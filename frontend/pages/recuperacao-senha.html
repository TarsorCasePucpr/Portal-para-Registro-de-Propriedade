    <section id="recuperacao-section">
      <h1>Recuperar senha</h1>

      <!--
        PASSO 1: Solicitar link de recuperação
        action → backend/auth/recover.php (POST) — ação: solicitar_link

        Segurança:
          - Resposta SEMPRE genérica: "Se o e-mail estiver cadastrado, você receberá
            um link em breve." — NUNCA confirmar ou negar existência do e-mail
          - Token: bin2hex(random_bytes(32)) → enviado raw no link,
                   armazenado como hash('sha256', $token) na tabela tokens
          - Expiração: 1 hora (tokens.expires_at = NOW() + INTERVAL 1 HOUR)
          - Token de uso único: deletar após uso ou expiração
          - Rate limiting: máx. 3 solicitações / 60 min por IP
          - CSRF token obrigatório
          - Envio via PHPMailer (NUNCA mail() nativo — header injection)

        LGPD — Art. 9 (Transparência):
          Informar que o e-mail é usado apenas para envio do link de recuperação.
      -->
      <form id="form-recuperacao" action="../../backend/auth/recover.php" method="POST" novalidate>
        <!-- TODO: <input type="hidden" name="csrf" value="[gerado pelo PHP]">
                   <input type="hidden" name="acao" value="solicitar_link"> -->

        <!-- TODO: Input e-mail -->

        <!-- TODO: Botão submit -->

        <!-- TODO: Link "Voltar para o login" → login.html -->
      </form>

      <!-- Estado pós-submissão: mensagem genérica (independente de o e-mail existir) -->
