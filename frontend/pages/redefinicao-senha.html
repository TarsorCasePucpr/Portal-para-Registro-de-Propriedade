<div id="estado-formulario">
  <form id="form-nova-senha" action="../../backend/auth/recover.php" method="POST" novalidate>
    
    <input type="hidden" name="acao" value="redefinir_senha">
    <input type="hidden" name="token" id="token">

    <label for="nova-senha">Nova senha</label>
    <input type="password" id="nova-senha" name="nova_senha" required
      maxlength="255" autocomplete="new-password"
      pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{12,}">

    <div id="forca-senha">Força: -</div>
    <small>Mín. 12 caracteres, maiúscula, minúscula, número e símbolo</small>

    <label for="confirmar-nova-senha">Confirmar nova senha</label>
    <input type="password" id="confirmar-nova-senha" required maxlength="255">

    <button type="submit">Salvar nova senha</button>
  </form>
</div>
