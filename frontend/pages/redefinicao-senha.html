    <section id="redefinicao-section">
      <h1>Criar nova senha</h1>

      <!--
        PASSO 2: Definir nova senha via link do e-mail
        URL de acesso: /frontend/pages/redefinicao-senha.html?token=RAW_TOKEN
        action → backend/auth/recover.php (POST) — ação: redefinir_senha

        Fluxo:
          1. PHP lê token da URL (?token=...)
          2. PHP faz hash('sha256', $token) → busca na tabela tokens (tipo 'recovery')
          3. Verifica: token existe + not used_at + expires_at > NOW()
          4. Se válido: exibe formulário de nova senha
          5. Se inválido: exibe erro e link para solicitar novo token

        Segurança:
          - Token raw NUNCA armazenado na DB — apenas hash SHA-256
          - Comparação: hash_equals($storedHash, hash('sha256', $providedToken))
          - Nova senha: password_hash($novaSenha, PASSWORD_BCRYPT, ['cost' => 13])
          - Invalidar token após uso: UPDATE tokens SET used_at = NOW() WHERE ...
          - Invalidar todas as sessões ativas do usuário após mudança de senha
          - CSRF token obrigatório
          - Rate limiting implícito pelo tempo de expiração do token (1 hora)

        LGPD:
          Nenhum dado pessoal adicional é coletado nesta etapa.
      -->

      <!-- Estado 1: Token válido — mostrar formulário -->
      <div id="estado-formulario">
        <form id="form-nova-senha" action="../../backend/auth/recover.php" method="POST" novalidate>
